# Docker Compose - Production
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: hanzo-build-redis-prod
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - hanzo-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Next.js Application (Production)
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        NODE_ENV: production
    container_name: hanzo-build-app-prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379

      # Next.js
      NEXT_TELEMETRY_DISABLED: 1
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}

      # Auth
      HF_CLIENT_ID: ${HF_CLIENT_ID}
      HF_CLIENT_SECRET: ${HF_CLIENT_SECRET}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}

      # AI Providers
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY}

      # Hanzo Commerce (replaces Stripe)
      HANZO_COMMERCE_API_URL: ${HANZO_COMMERCE_API_URL}
      HANZO_COMMERCE_API_KEY: ${HANZO_COMMERCE_API_KEY}
      HANZO_COMMERCE_WEBHOOK_SECRET: ${HANZO_COMMERCE_WEBHOOK_SECRET}

      # Sentry
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN}
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN}

      # Health Check
      HEALTH_CHECK_SECRET: ${HEALTH_CHECK_SECRET}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - hanzo-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

volumes:
  redis_data:
    driver: local

networks:
  hanzo-network:
    driver: bridge
