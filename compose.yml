# Docker Compose - Local Development
# Usage: docker compose up

services:
  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: hanzo-build-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - hanzo-network

  # Next.js Application (Development)
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: hanzo-build-app
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      # Redis
      REDIS_URL: redis://redis:6379

      # Next.js
      NEXT_TELEMETRY_DISABLED: 1
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3002

      # Auth - Use local dev mode
      HF_TOKEN: local_dev_token
      NEXTAUTH_SECRET: dev-secret-change-in-production-32chars
      NEXTAUTH_URL: http://localhost:3002

      # These can be set in .env.local or here
      # HF_CLIENT_ID: ${HF_CLIENT_ID}
      # HF_CLIENT_SECRET: ${HF_CLIENT_SECRET}
      # OPENAI_API_KEY: ${OPENAI_API_KEY}
      # ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      # Mount source code for hot reload
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - hanzo-network
    stdin_open: true
    tty: true

  # Redis Commander - Redis UI (Optional)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: hanzo-build-redis-commander
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis
    networks:
      - hanzo-network
    profiles:
      - tools

volumes:
  redis_data:
    driver: local

networks:
  hanzo-network:
    driver: bridge
