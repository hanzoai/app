name: Platform Build

# Thin shim — platform.hanzo.ai dispatches this (workflow_dispatch) for the
# workflow_dispatch fallback mode and it delegates to the shared reusable
# executor. All build/push/callback logic lives in hanzoai/.github; this file
# only passes the dispatch inputs through. Repos served by a live native arcd
# runner never trigger this — the platform long-polls arcd directly.

on:
  workflow_dispatch:
    inputs:
      build-job-id:
        description: Platform buildJob id (echoed back on completion)
        required: true
      target:
        description: "Build target, e.g. linux/amd64"
        required: true
      runner-pool:
        description: "arcd pool label, e.g. hanzoai-linux-amd64"
        required: true
      image:
        description: "Fully-resolved image ref, e.g. ghcr.io/hanzoai/app:<sha>"
        required: true
      dockerfile:
        description: Path to the Dockerfile
        required: true
        default: ./Dockerfile.production
      context:
        description: Build context
        required: true
        default: .
      push:
        description: Whether to push the built image
        required: true
        default: "true"

jobs:
  build:
    uses: hanzoai/.github/.github/workflows/platform-build.yml@main
    with:
      build-job-id: ${{ inputs.build-job-id }}
      target: ${{ inputs.target }}
      runner-pool: ${{ inputs.runner-pool }}
      image: ${{ inputs.image }}
      dockerfile: ${{ inputs.dockerfile }}
      context: ${{ inputs.context }}
      push: ${{ inputs.push }}
    secrets: inherit
