name: Docker
on:
  workflow_dispatch:
  push:
    branches: [main, develop, dev, test]
    tags: ['v*']
permissions:
  contents: read
  id-token: write
  packages: write
jobs:
  docker:
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/app
      dockerfile: Dockerfile.production
    secrets: inherit
