name: Docker
on:
  workflow_dispatch:
  push:
    branches: [main, develop, dev, test]
    tags: ['v*']
  pull_request:
    branches: [main]
permissions:
  contents: read
  id-token: write
  packages: write
jobs:
  docker:
    if: github.event_name != 'pull_request'
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/app
      dockerfile: Dockerfile.production
      platforms: linux/amd64
    secrets: inherit
