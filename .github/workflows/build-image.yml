name: Build Docker Image
# Builds + pushes ghcr.io/hanzoai/hanzo-app on the self-hosted ARC runner
# (hanzo-build-linux-amd64). This is the native build lane AFTER arcd was dropped
# — modeled on the proven hanzoai/console build-image.yml: raw `docker buildx
# build` on the host builder, immutable content-addressable `sha-` tags, and a
# race-safe atomic `v<X.Y.Z>` receipt. GitHub.com never runs the build (the job
# is pinned to our self-hosted runner), so this is not a "GitHub builder".
#
# TAGS ARE IMMUTABLE RECEIPTS. Every build pushes `sha-<sha>` (unique, can never
# race or overwrite). The release version = max(highest git tag, highest pushed
# container tag) + 1 — folding in container tags means a number that already has
# an image is never reused (hanzo-app's git tags lag the container tags because
# the retired arcd lane pushed container tags without git-tag receipts; this
# reconciles them). The proven `sha-` image is retagged to `:v<X.Y.Z>` ATOMICALLY
# and the git tag pushed as the receipt, so `:v` exists iff its git tag exists.
#
# DO NOT hand-cut v* tags — this workflow OWNS them.

on:
  push:
    branches: [main]
  workflow_dispatch:

# One serialized release lane. Never cancel in-flight: a run killed between "image
# pushed" and "tag created" is exactly the drift this prevents, and two main pushes
# must never compute the same next version (the queued run starts only after the
# running one tags, re-reads the tags, and lands on the next free patch — monotonic).
concurrency:
  group: release-hanzo-app
  cancel-in-progress: false

permissions:
  contents: write   # push the git-tag receipt
  packages: write   # push the image

jobs:
  docker:
    runs-on: [hanzo-build-linux-amd64]
    steps:
      - name: Checkout (full history + all tags — the version floor is read from tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve commit sha (the immutable primary tag)
        id: ver
        run: |
          set -euo pipefail
          git fetch --tags --force --quiet
          sha_short="$(git rev-parse --short "$GITHUB_SHA")"
          echo "sha_short=${sha_short}" >> "$GITHUB_OUTPUT"
          echo "Immutable primary tag: sha-${sha_short}"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Ensure base image (reuse host cache)
        # No-op on a warm runner. Pre-pull the exact base the Dockerfile's FROM uses
        # so `docker buildx build` reuses it instead of re-pulling mid-build.
        run: |
          set -u
          base=node:20-alpine
          if docker image inspect "$base" >/dev/null 2>&1; then
            echo "base $base already cached on runner"; exit 0
          fi
          for i in 1 2 3 4 5; do
            if docker pull "$base"; then exit 0; fi
            echo "pull failed (attempt $i/5) — backing off"; sleep $((i * 30))
          done
          echo "could not pull $base after retries"; exit 1

      - name: Build & push the immutable per-commit image (host builder — reuses base cache)
        # The Next production build the Dockerfile runs (standalone output + tsc) is the
        # gate: a broken build fails HERE and pushes nothing, so no tag is ever minted
        # for it. Push ONLY the content-addressable sha- tag — unique, never races.
        run: |
          set -euo pipefail
          docker buildx build \
            --platform linux/amd64 \
            --push \
            -t ghcr.io/hanzoai/hanzo-app:sha-${{ steps.ver.outputs.sha_short }} \
            -f Dockerfile.production .

      # THE RECEIPT + ATOMIC VERSION ASSIGNMENT (race-safe). Reached only because the
      # build + push succeeded, so a proven image exists under the unique sha- tag.
      - name: Tag the proven image (atomic free-version receipt — race-safe)
        id: tag
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name  "hanzo-dev"
          git config user.email "dev@hanzo.ai"
          SHA_IMG="ghcr.io/hanzoai/hanzo-app:sha-${{ steps.ver.outputs.sha_short }}"
          TOKEN="${GH_PAT:-$GH_TOKEN}"
          PUSH_URL="https://x-access-token:${TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          for attempt in $(seq 1 8); do
            git fetch --tags --force --quiet

            # Highest semver git tag (vX.Y.Z), normalised without the leading v.
            git_max="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' \
              | sed 's/^v//' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1 || true)"

            # Fail-CLOSED on the container-tag lookup: an image pushed under a version
            # (even by the retired arcd lane, which left no git tag) MUST raise the floor,
            # or a later run reassigns that number to different bytes. If the lookup ERRORS
            # (vs legitimately empty) retry the whole attempt rather than reuse a number.
            cont_max=""
            if command -v gh >/dev/null 2>&1; then
              if cont_raw="$(GH_TOKEN="$TOKEN" gh api \
                  '/orgs/hanzoai/packages/container/hanzo-app/versions?per_page=100' \
                  --jq '.[].metadata.container.tags[]?' 2>/dev/null)"; then
                cont_max="$(printf '%s\n' "$cont_raw" \
                  | sed 's/^v//' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1 || true)"
              else
                echo "  container-tag lookup failed — retry so an existing tag can't be reused (attempt $attempt)"; sleep 3; continue
              fi
            fi

            # Floor = highest of the two; fall back to 1.42.0 only if the repo somehow
            # has no tags. next = floor patch + 1 (patch bump only, on the 1.42.x line).
            max="$(printf '%s\n%s\n%s\n' "1.42.0" "$git_max" "$cont_max" \
              | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)"
            major="${max%%.*}"; rest="${max#*.}"; minor="${rest%%.*}"; patch="${rest##*.}"
            VER="${major}.${minor}.$((patch + 1))"; V="v${VER}"

            if git rev-parse -q --verify "refs/tags/$V" >/dev/null; then
              echo "  $V already tagged — recomputing (attempt $attempt)"; sleep 3; continue
            fi

            # Metadata-only retag of the PROVEN sha-image → the version tag (no rebuild).
            docker buildx imagetools create -t "ghcr.io/hanzoai/hanzo-app:${V}" "$SHA_IMG"

            git tag -a "$V" -m "release $V — image ghcr.io/hanzoai/hanzo-app:$V (retagged from sha-${{ steps.ver.outputs.sha_short }}, ${GITHUB_SHA})"
            if git push "$PUSH_URL" "$V" 2>/dev/null; then
              echo "Tagged $V → ghcr.io/hanzoai/hanzo-app:$V (immutable receipt for sha-${{ steps.ver.outputs.sha_short }})"
              echo "version=${VER}"   >> "$GITHUB_OUTPUT"
              echo "version_v=${V}"   >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "  push of $V lost the race — recomputing (attempt $attempt)"
            git tag -d "$V" >/dev/null 2>&1 || true
            sleep 3
          done
          echo "::error::could not acquire a free version tag after 8 attempts"
          exit 1
