<!DOCTYPE html>
<html>
<head>
    <title>Hanzo App Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        iframe {
            width: 100%;
            height: 600px;
            border: 2px solid #333;
            border-radius: 16px;
            background: #000;
        }
        .status {
            margin: 20px 0;
            padding: 10px;
            background: #333;
            border-radius: 8px;
        }
        .error {
            color: #ff6b6b;
        }
        .success {
            color: #51cf66;
        }
        .controls {
            margin: 20px 0;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            background: #0084ff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover {
            background: #0073e6;
        }
        pre {
            background: #2a2a2a;
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>Hanzo App Test Page</h1>
    <div class="status" id="status">Loading...</div>
    
    <div class="controls">
        <button onclick="testLauncher()">Test Launcher View</button>
        <button onclick="testAI()">Test AI View</button>
        <button onclick="testSettings()">Test Settings</button>
        <button onclick="checkConsole()">Check Console</button>
        <button onclick="reloadFrame()">Reload</button>
    </div>
    
    <iframe id="app-frame" src="http://localhost:5173"></iframe>
    
    <h2>Console Logs:</h2>
    <pre id="console-output"></pre>
    
    <script>
        const frame = document.getElementById('app-frame');
        const status = document.getElementById('status');
        const consoleOutput = document.getElementById('console-output');
        let logs = [];
        
        // Intercept console from iframe
        frame.onload = function() {
            try {
                const frameWindow = frame.contentWindow;
                
                // Check if app loaded
                if (frameWindow.document.getElementById('root')) {
                    status.innerHTML = '<span class="success">✓ App loaded successfully</span>';
                    
                    // Intercept console
                    const originalLog = frameWindow.console.log;
                    const originalError = frameWindow.console.error;
                    const originalWarn = frameWindow.console.warn;
                    
                    frameWindow.console.log = function(...args) {
                        logs.push({type: 'log', message: args.join(' ')});
                        updateConsole();
                        originalLog.apply(frameWindow.console, args);
                    };
                    
                    frameWindow.console.error = function(...args) {
                        logs.push({type: 'error', message: args.join(' ')});
                        updateConsole();
                        originalError.apply(frameWindow.console, args);
                    };
                    
                    frameWindow.console.warn = function(...args) {
                        logs.push({type: 'warn', message: args.join(' ')});
                        updateConsole();
                        originalWarn.apply(frameWindow.console, args);
                    };
                } else {
                    status.innerHTML = '<span class="error">✗ App failed to load</span>';
                }
            } catch (e) {
                status.innerHTML = '<span class="error">✗ Error: ' + e.message + '</span>';
            }
        };
        
        function updateConsole() {
            consoleOutput.innerHTML = logs.map(log => {
                const color = log.type === 'error' ? '#ff6b6b' : 
                             log.type === 'warn' ? '#ffd93d' : '#fff';
                return `<span style="color: ${color}">[${log.type}] ${log.message}</span>`;
            }).join('\n');
        }
        
        function testLauncher() {
            frame.contentWindow.postMessage({type: 'switchMode', mode: 'launcher'}, '*');
            status.innerHTML = 'Switched to launcher mode';
        }
        
        function testAI() {
            frame.contentWindow.postMessage({type: 'switchMode', mode: 'chat'}, '*');
            status.innerHTML = 'Switched to AI chat mode';
        }
        
        function testSettings() {
            const frameWindow = frame.contentWindow;
            const event = new KeyboardEvent('keydown', {
                key: ',',
                metaKey: true,
                bubbles: true
            });
            frameWindow.document.dispatchEvent(event);
            status.innerHTML = 'Triggered settings shortcut';
        }
        
        function checkConsole() {
            const frameWindow = frame.contentWindow;
            const errors = [];
            
            // Check for React errors
            if (frameWindow.document.querySelector('.error-boundary')) {
                errors.push('React error boundary triggered');
            }
            
            // Check CSS
            const body = frameWindow.document.body;
            const styles = frameWindow.getComputedStyle(body);
            if (styles.backgroundColor === 'rgba(0, 0, 0, 0)') {
                errors.push('CSS not loaded - transparent background');
            }
            
            // Check for elements
            const root = frameWindow.document.getElementById('root');
            if (!root || !root.children.length) {
                errors.push('Root element empty');
            }
            
            if (errors.length > 0) {
                status.innerHTML = '<span class="error">Issues found: ' + errors.join(', ') + '</span>';
            } else {
                status.innerHTML = '<span class="success">✓ No issues found</span>';
            }
        }
        
        function reloadFrame() {
            logs = [];
            frame.src = frame.src;
            status.innerHTML = 'Reloading...';
        }
    </script>
</body>
</html>
