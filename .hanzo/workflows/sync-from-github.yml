name: Sync from GitHub
# git.hanzo.ai is the build plane (release.yml cuts every image natively) but
# development also lands on github.com/hanzoai/app. The old push-based mirror
# (GitHub sync.yml nudge → /api/v1/.../mirror-sync) is DEAD: the repo is not a
# Gitea mirror (mirror:false) and the external git.hanzo.ai HTTP surface routes
# to cloud:8000, so the nudge "succeeds" against a SPA page while Gitea goes
# stale and NO images build (bit twice: 07-23 and 07-24, each time needing a
# manual port-forward push).
#
# This is the ONE deterministic direction instead: an in-cluster PULL. The
# runner reaches both ends — GitHub outbound and this Gitea via the instance
# URL actions/checkout already uses — no ingress dependency. Fast-forward only:
# a divergence fails LOUDLY here rather than force-pushing either side.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}
concurrency:
  group: sync-from-github
  cancel-in-progress: false
jobs:
  ff-main:
    runs-on: [hanzo-build-linux-amd64]
    steps:
      - name: Checkout Gitea main (full history for the ancestry check)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Persist the token-auth remote so the push below reuses it.
          persist-credentials: true
      - name: Fast-forward main from github.com/hanzoai/app
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          git fetch --quiet "https://x-access-token:${GH_PAT}@github.com/hanzoai/app.git" main
          LOCAL="$(git rev-parse HEAD)"
          REMOTE="$(git rev-parse FETCH_HEAD)"
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "in sync at $LOCAL"
            exit 0
          fi
          if git merge-base --is-ancestor "$LOCAL" "$REMOTE"; then
            echo "fast-forwarding $LOCAL -> $REMOTE"
            git push origin "$REMOTE:refs/heads/main"
          elif git merge-base --is-ancestor "$REMOTE" "$LOCAL"; then
            echo "Gitea is AHEAD of GitHub ($REMOTE ancestor of $LOCAL) — nothing to pull."
            echo "(GitHub catch-up is a separate concern; never force from here.)"
          else
            echo "::error::main DIVERGED between GitHub ($REMOTE) and Gitea ($LOCAL) — refusing to force. Reconcile manually."
            exit 1
          fi
