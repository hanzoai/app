name: Release
# Cuts a release of ghcr.io/hanzoai/hanzo-app — the WEB app image the operator CR
# (universe: hanzo-app.yaml) pins. Mirrors hanzoai/cloud/release.yml exactly:
#     a git tag v<X.Y.Z>  ⇔  an image ghcr.io/hanzoai/hanzo-app:v<X.Y.Z>
# Builds on the hanzo arcd runners (NOT the GHCR-gated PaaS platform-build, and NOT
# the Rust CLI Release-Matrix). ghcr auth via GH_PAT / user hanzo-dev, same as cloud —
# this is the piece platform-build lacked (the `denied` failure).
on:
  push:
    branches: [main]
    # Workflow/doc-only edits must NOT cut a release (a scan tweak is not a new app
    # image). Real code changes on main still trigger; use workflow_dispatch to force.
    paths-ignore:
      - '.github/**'
      - '**.md'
  workflow_dispatch:
permissions:
  contents: write
  packages: write
  id-token: write
concurrency:
  group: release-app
  cancel-in-progress: false
jobs:
  build-amd64:
    runs-on: [hanzo-build-linux-amd64]
    steps:
      - name: Checkout (full history + tags — version floor read from tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Compute next version (monotonic patch bump over the 1.42.x deploy line)
        id: ver
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          git fetch --tags --force --quiet
          # The deployed lineage is 1.42.x: the operator CR (universe: hanzo-app.yaml)
          # and every ghcr.io/hanzoai/hanzo-app image are on it, and the newest-by-date
          # commits on main are tagged v1.42.x. Stray older tags exist off that line
          # (v2.2.0 = a 2025 "stack integration" relic, v2.2.1 = a one-off CSP fix,
          # v1.75.0 = a June relic). `sort -V` is purely numeric, so an UNCONSTRAINED
          # scan lets 2.2.1 > 1.75.0 > 1.42.x hijack the floor and cut a v2.2.2 the CR
          # can't follow. Pin the scan to the 1.42. line so the bump stays monotonic
          # over the ACTUAL deploy stream, not the numerically-largest orphan tag.
          LINE='1.42.'
          git_max="$(git tag -l "v${LINE}[0-9]*" \
            | sed 's/^v//' | grep -E "^${LINE//./\\.}[0-9]+$" | sort -V | tail -1 || true)"
          # Fold in ALREADY-PUSHED container tags on the same line, so a number that has
          # an image (even from a run that died before git-tagging) is never reused
          # (mirrors hanzoai/cloud). Best-effort — never fails the run if the API is down.
          # Use curl (universally present) NOT gh — the arcd runners have no `gh`, so
          # the gh-gated scan returned container_max='none' and the first run cut
          # v1.42.11 instead of v1.42.13. Fold BOTH v-prefixed and legacy non-v 1.42.x
          # image tags so the v-stream never numerically collides with the retired
          # platform-build non-v tags. jq-optional: grep fallback if a runner lacks jq.
          cont_max=""
          if [ -n "${GH_PAT:-}" ]; then
            _pkgjson="$(curl -fsSL -H "Authorization: Bearer $GH_PAT" \
              -H "Accept: application/vnd.github+json" \
              'https://api.github.com/orgs/hanzoai/packages/container/hanzo-app/versions?per_page=100' 2>/dev/null || true)"
            cont_max="$(printf '%s' "$_pkgjson" \
              | { jq -r '.[].metadata.container.tags[]?' 2>/dev/null || grep -oE '"v?[0-9]+\.[0-9]+\.[0-9]+"' | tr -d '"'; } \
              | sed 's/^v//' | grep -E "^${LINE//./\\.}[0-9]+$" | sort -V | tail -1 || true)"
          fi
          max="$(printf '%s\n%s\n%s\n' "${LINE}0" "$git_max" "$cont_max" \
            | grep -E "^${LINE//./\\.}[0-9]+$" | sort -V | tail -1)"
          major="${max%%.*}"; rest="${max#*.}"; minor="${rest%%.*}"; patch="${rest##*.}"
          version="${major}.${minor}.$((patch + 1))"
          if git rev-parse -q --verify "refs/tags/v${version}" >/dev/null; then
            echo "::error::computed v${version} already exists — aborting to avoid collision"; exit 1
          fi
          echo "version_v=v${version}" >> "$GITHUB_OUTPUT"
          echo "Next release: v${version} (git_max='${git_max:-none}' container_max='${cont_max:-none}')"
      - name: Stamp package.json with the release version
        # The sidebar / about-modal / dashboard read `pkg.version`; without this the
        # image ships whatever version was last hand-committed (was frozen at 1.42.21
        # while deploys ran ahead). Write the computed release version into the build
        # context so the shown version always matches the deployed tag.
        run: |
          v="${{ steps.ver.outputs.version_v }}"; v="${v#v}"
          sed -i.bak -E "s/(\"version\"[[:space:]]*:[[:space:]]*\")[^\"]+(\")/\1${v}\2/" package.json && rm -f package.json.bak
          echo "package.json -> $(grep -m1 '\"version\"' package.json)"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: network=host
      # ghcr auth: same as hanzoai/cloud — GH_PAT (a PAT with write:packages, user
      # hanzo-dev). The repo's old GHCR_TOKEN (Mar 2026) is stale/insufficient →
      # "denied". Add GH_PAT to the repo secrets (mirror cloud) and this ships.
      - name: Log in to ghcr.io (GH_PAT, write:packages — mirrors cloud)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: hanzo-dev
          password: ${{ secrets.GH_PAT }}
      - name: Build + push ghcr.io/hanzoai/hanzo-app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.production
          platforms: linux/amd64
          push: true
          tags: ghcr.io/hanzoai/hanzo-app:${{ steps.ver.outputs.version_v }}
          provenance: false
      - name: Verify the pushed image is pullable (guard the image ⇔ tag invariant)
        # build-push-action can exit 0 while the manifest isn't yet resolvable at the
        # registry (or a partial push). If we tag git anyway, the CR bump lands on a
        # phantom tag → ImagePullBackOff (exactly what bit v1.42.122). Prove the image
        # resolves BEFORE creating the git tag, so a bad push fails the run instead.
        run: |
          set -euo pipefail
          v="${{ steps.ver.outputs.version_v }}"
          for i in 1 2 3 4 5 6; do
            if docker manifest inspect "ghcr.io/hanzoai/hanzo-app:${v}" >/dev/null 2>&1; then
              echo "image ${v} is resolvable — safe to tag"; exit 0
            fi
            echo "ghcr manifest ${v} not visible yet (attempt ${i}/6) — retrying"; sleep 5
          done
          echo "::error::image ${v} not pullable after push — refusing to tag git (prevents ImagePullBackOff)"; exit 1
      - name: Tag the release (image ⇔ tag invariant)
        run: |
          set -euo pipefail
          git tag "${{ steps.ver.outputs.version_v }}"
          git push origin "${{ steps.ver.outputs.version_v }}"
          echo "Pushed image + tag ${{ steps.ver.outputs.version_v }} — bump the operator CR (universe: hanzo-app.yaml) to deploy."
