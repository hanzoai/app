name: hanzo-app
region: sfo
domains:
  - domain: hanzo.app
    type: PRIMARY
  - domain: www.hanzo.app
    type: ALIAS

services:
  - name: web
    github:
      repo: hanzoai/app
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile.production
    instance_count: 1
    instance_size_slug: professional-xs
    http_port: 3000
    routes:
      - path: /
    health_check:
      http_path: /api/health
      initial_delay_seconds: 60
      period_seconds: 30
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: HOSTNAME
        value: "0.0.0.0"
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: CI
        value: "true"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=4096"
      - key: NEXTAUTH_URL
        value: "https://hanzo.app"
      - key: NEXT_PUBLIC_APP_URL
        value: "https://hanzo.app"
      - key: HF_CLIENT_ID
        type: SECRET
        value: "f811c2f6-2683-4c25-ad11-4e2734c6cd35"
      - key: HF_CLIENT_SECRET
        type: SECRET
        value: "a178f7c6-e8b4-440a-8314-d727dcd1f8aa"
